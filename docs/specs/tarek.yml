openapi: '3.1.2'
info:
  title: Keyboard and Mice API
  description: A REST API that provides info about national parks in North America.
  version: '1.0'
servers:
  - url: http://localhost/parks-api
paths:
 /locations:
    get:
      description: 'Get the list of national parks locations'
      parameters:
        - name: name
          in: query
          description: The name of the national park
          required: false
          schema:
            type: string
        - name: country
          in: query
          description: Name of the country the national park is in
          required: false
          schema:
            type: string
        - name: province
          in: query
          description: Name of the province the national park is in
          required: false
          schema:
            type: string
        - name: area.min
          in: query
          description: Minimum area by square kilometer of the national park
          required: false
          schema:
            type: number
        - name: area.max
          in: query
          description: Maximum area by square kilometer of the national park
          required: false
          schema:
            type: number
        - name: sort_by
          in: query
          description: Field to sort results by
          required: false
          schema:
            type: string
            enum:
              - id
              - name
              - country
              - area
            default: id
        - name: order
          in: query
          description: Sort direction
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
        '400':
          description: Bad Request
        '422':
          description: Unprocessable Entity
        '404':
          description: Not Found
components:
  schemas:
    Location:
      x-swagger-router-model: io.swagger.parks.model.Location
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 'Maple Ridge Park'
        country:
          type: string
          example: 'Canada'
        province:
          type: string
          example: 'British Columbia'
        address:
          type: string
          example: '123 Forest Rd'
        latitude:
          type: number
          format: float
          example: '49.282700'
        longitude:
          type: number
          format: float
          example: '-123.120700'
        area_km2:
          type: number
          format: float
          example: 512.30
        max_elevation_m:
          type: integer
          format: int64
          example: 2401
        continent:
          type: string
          example: 'North America'
        website:
          type: string
          format: uri
          example: 'https://mapleridge.example'

